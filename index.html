<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href = "style.css">
    <link rel = "stylesheet" href = "utils.css"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
<!-- <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> -->
<!-- <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Varela+Round&display=swap" rel="stylesheet"> -->
    <title> A Calculator Made By Me </title>
</head>
<body>
     <h1 class = "text-center">Welcome to Calculate me ! </h1>
     <div class ="container flex flex-col items-center  mx-auto m-w-20">
        <div class = "row">
            <input class = "input" type = "text"/>
             <div class = "row">
                 <button class = "button">c</button>
                 <button class = "button">%</button>
                 <button class = "button">M+</button> 
                 <button class = "button">M-</button>  
             </div>
                </div>
             <div class = "row">
                 <button class = "button">7</button>
                 <button class = "button">8</button>
                 <button class = "button">9</button> 
                 <button class = "button">*</button>  
             </div>

                 <div class = "row">
                 <button class = "button">4</button>
                 <button class = "button">5</button>
                 <button class = "button">6</button> 
                 <button class = "button">/</button>  
             </div>

                 <div class = "row">
                 <button class = "button">1</button>
                 <button class = "button">2</button>
                 <button class = "button">3</button> 
                 <button class = "button">+</button>  
             </div>

             
                 <div class = "row">
                 <button class = "button">0</button>
                 <button class = "button">.</button>
                 <button class = "button">=</button> 
                 <button class = "button">-</button>  
             </div>
     </div>
            
    <script src = "script.js"></script>
</body>
</html>
